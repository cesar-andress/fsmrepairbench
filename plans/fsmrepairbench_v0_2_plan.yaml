# FSMRepairBench v0.2.0 stratified benchmark campaign plan
# 1000 taxonomy-balanced cases spanning DFA/NFA (plain_fsm), Mealy, Moore, EFSM, and timed FSM.
# Tiny machines with shallow oracles keep generation and campaign analysis fast.

name: fsmrepairbench_v0_2
version: "0.2.0"
seed: 45
cells:

  # DFA — plain_fsm, deterministic (150 cases)
  - machine_type: plain_fsm
    determinism: deterministic
    completeness: partial
    arity_class: low
    size_class: tiny
    guard_complexity: none
    time_features: [none]
    graph_structure: [hub_and_spoke]
    oracle_depth: shallow
    bug_type: missing_transition
    count: 50
  - machine_type: plain_fsm
    determinism: deterministic
    completeness: partial
    arity_class: low
    size_class: tiny
    guard_complexity: none
    time_features: [none]
    graph_structure: [hub_and_spoke]
    oracle_depth: shallow
    bug_type: wrong_source
    count: 50
  - machine_type: plain_fsm
    determinism: deterministic
    completeness: partial
    arity_class: low
    size_class: tiny
    guard_complexity: none
    time_features: [none]
    graph_structure: [hub_and_spoke]
    oracle_depth: shallow
    bug_type: wrong_event
    count: 50

  # NFA — plain_fsm, nondeterministic (100 cases)
